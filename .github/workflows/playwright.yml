name: E2E Tests - Playwright

on:
  pull_request:
    branches: [main, develop]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'package.json'
      - 'wrangler.jsonc'
  
  push:
    branches: [main]
  
  workflow_dispatch:

jobs:
  test:
    name: Playwright E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    
    strategy:
      fail-fast: false
      matrix:
        shard: [1/2, 2/2]
    
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
      
      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: 📦 Install dependencies
        run: npm ci
      
      - name: 🎭 Install Playwright browsers
        run: npx playwright install --with-deps chromium
      
      - name: 🏗️ Build application
        run: npm run build
        env:
          NODE_ENV: production
      
      - name: 🚀 Start development server
        run: |
          npm run dev:sandbox &
          echo "Waiting for server to start..."
          sleep 10
          curl --retry 10 --retry-delay 2 --retry-connrefused http://localhost:3000 || exit 1
        env:
          PORT: 3000
      
      - name: 🧪 Run Playwright tests
        run: npx playwright test --shard=${{ matrix.shard }}
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:3000
          CI: true
      
      - name: 📊 Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-${{ matrix.shard }}
          path: |
            playwright-report/
            test-results/
          retention-days: 7
      
      - name: 📸 Upload failed test screenshots
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: failed-screenshots-${{ matrix.shard }}
          path: test-results/**/test-failed-*.png
          retention-days: 7
      
      - name: 🎥 Upload failed test videos
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: failed-videos-${{ matrix.shard }}
          path: test-results/**/video.webm
          retention-days: 7
  
  report:
    name: Generate Test Report
    needs: test
    runs-on: ubuntu-latest
    if: always()
    
    steps:
      - name: 📥 Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-reports
      
      - name: 📊 Merge Playwright reports
        run: |
          echo "## 🧪 Playwright E2E Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ -f "all-reports/playwright-report-1-2/results.json" ]; then
            echo "✅ Shard 1/2 completed" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [ -f "all-reports/playwright-report-2-2/results.json" ]; then
            echo "✅ Shard 2/2 completed" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📊 View detailed report in artifacts" >> $GITHUB_STEP_SUMMARY
  
  status-check:
    name: E2E Status Check
    needs: test
    runs-on: ubuntu-latest
    if: always()
    
    steps:
      - name: ✅ Check test results
        run: |
          if [ "${{ needs.test.result }}" == "success" ]; then
            echo "✅ All E2E tests passed!"
            exit 0
          else
            echo "❌ E2E tests failed!"
            exit 1
          fi
